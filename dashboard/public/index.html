<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Essentials — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- Login Screen -->
<div id="login-screen" class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="12" fill="url(#grad)"/>
                    <path d="M12 16C12 16 15.5 13 20 13C24.5 13 28 16 28 16" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="16" cy="21" r="2" fill="white"/>
                    <circle cx="24" cy="21" r="2" fill="white"/>
                    <path d="M14 26C14 26 16 28 20 28C24 28 26 26 26 26" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    <defs><linearGradient id="grad" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#5865F2"/><stop offset="1" stop-color="#EB459E"/></linearGradient></defs>
                </svg>
            </div>
            <h1>Discord Essentials</h1>
            <p>Dashboard Control Panel</p>
        </div>
        <form id="login-form">
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Enter dashboard password..." required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                <span>Login</span>
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <p id="login-error" class="error-text" hidden></p>
        </form>
    </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="dashboard" hidden>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img id="bot-avatar" src="" alt="Bot" class="bot-avatar">
            <div class="sidebar-brand">
                <h2 id="bot-name">Bot</h2>
                <span class="status-badge">Online</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" data-page="overview">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                <span>Overview</span>
            </a>
            <a href="#" class="nav-item" data-page="servers">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 01-7.74 5.74L5 19H3v-2l5.26-5.26A6 6 0 1118 8z"/></svg>
                <span>Servers</span>
            </a>
            <a href="#" class="nav-item" data-page="commands">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                <span>Commands</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button id="btn-logout" class="btn btn-ghost btn-full">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
        <!-- Filled by JS -->
    </main>
</div>

<script src="/app.js"></script>
</body>
</html>
